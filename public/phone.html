<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <!-- スマホ表示の最適化。ユーザーがピンチズームできないようにする -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>GPS送信</title>
</head>
<body onload="startTracking()"></body>

  <h1>GPS送信</h1>

  <!-- デバイス名の入力欄（複数スマホを区別するため） -->
  <input type="text" id="deviceName" placeholder="デバイス名（例: 田中のスマホ）">

  <script>

    // ===== 変数の定義 =====
    let ws        = null; // WebSocket の接続オブジェクト
    let watchId   = null; // GPS監視のID（停止するときに使う）
    let sendCount = 0;    // 送信回数のカウンター
    let lastPosition = null; // 最後に取得した位置情報を保持しておく
    let gpsStatusText = '待機中'; // GPS状態を文字列で保持（サーバーに送るため）

    // 送信間隔（ミリ秒）。5000 = 5秒ごとに送信
    const SEND_INTERVAL = 5000;
    let sendTimer = null; // setInterval のID（停止するときに使う）

    // デバイスIDを取得する（なければ生成してlocalStorageに保存）
    function getDeviceId() {
      let id = localStorage.getItem('deviceId');
      if (!id) {
        // ランダムな8文字の文字列を生成
        id = 'device_' + Math.random().toString(36).substr(2, 8);
        localStorage.setItem('deviceId', id);
      }
      return id;
    }

    // 「送信開始」ボタンを押したときに呼ばれる
    async function startTracking() {

      // GPS が使えるブラウザか確認
      if (!navigator.geolocation) {
        alert('このブラウザはGPSに対応していません');
        return;
      }

      // WebSocket でサーバーに接続する
      // http → ws、https → wss に自動で切り替える
      const wsUrl = location.protocol === 'https:'
        ? `wss://${location.host}`
        : `ws://${location.host}`;

      ws = new WebSocket(wsUrl);

      // 接続が確立したら GPS 監視を開始する（Promise で「接続完了まで待つ」）
      await new Promise((resolve, reject) => {
        ws.onopen  = () => { resolve(); };
        ws.onerror = () => { reject(); };
      });

      // GPS の監視を開始する（位置が変わるたびに lastPosition を更新）
      gpsStatusText = '取得中...';
      watchId = navigator.geolocation.watchPosition(
        (position) => {
          // 取得成功したら lastPosition に保存しておく
          lastPosition = position;
          gpsStatusText = '取得成功';
        },
        (error) => {
          gpsStatusText = 'エラー: ' + error.message;
        },
        { enableHighAccuracy: true, maximumAge: 0 } // 高精度GPS・キャッシュ不使用
      );

      // 5秒ごとに lastPosition をサーバーへ送信する
      sendTimer = setInterval(() => {
        if (lastPosition && ws.readyState === WebSocket.OPEN) {
          const { latitude, longitude, accuracy } = lastPosition.coords;
          ws.send(JSON.stringify({
            type:       'location',
            deviceId:   getDeviceId(),
            deviceName: document.getElementById('deviceName').value || 'スマホ',
            lat:        latitude,
            lng:        longitude,
            accuracy:   accuracy,
            timestamp:  new Date().toISOString(),
            gpsStatus:  gpsStatusText
          }));
          sendCount++;
        }
      }, SEND_INTERVAL);

    } 

    // 「送信停止」ボタンを押したときに呼ばれる
    function stopTracking() {

      // GPS の監視を止める
      if (watchId !== null) {
        navigator.geolocation.clearWatch(watchId);
        watchId = null;
      }

      // 定期送信のタイマーを止める
      if (sendTimer !== null) {
        clearInterval(sendTimer);
        sendTimer = null;
      }

      // WebSocket の接続を切る
      if (ws !== null) {
        ws.close();
        ws = null;
      }

      // GPS状態変数をリセットする
      gpsStatusText = '待機中';
      sendCount = 0;
      lastPosition = null;
      
    }

  </script>

</body>
</html>
